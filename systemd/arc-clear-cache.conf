# Drop-in override for the arc.service unit.
# Install to: /etc/systemd/system/arc.service.d/clear-cache.conf
#
# Clears page cache, dentries, inodes, and swap before each restart
# so the LLM starts with maximum free RAM.
# The leading '+' runs these commands as root regardless of service User=.

[Service]
ExecStartPre=+/bin/sh -c 'sync && echo 3 > /proc/sys/vm/drop_caches'
ExecStartPre=+/bin/sh -c 'swapoff -a && swapon -a'
